<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../css/style2.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components/newsletter.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/admin-review.css" />
    <link rel="stylesheet" href="../css/components/cartDrawer.css"/>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/854f8a6196.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="/images/Hexxo_Bg_Removed.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexxo : Authentication Review</title>
  </head>
  <body>
    <main>
      <section id="header">
        <nav aria-label="Main Navigation"></nav>
      </section>

      <header class="content-header">
        <h1>Authentication Review</h1>
        <p class="subheader">Requests awaiting a human decision</p>
      </header>

      <section id="not-authorized" class="review-guard" style="display: none">
        <p>You don't have access to this page.</p>
      </section>

      <section id="review-list" class="review-list">
        <p class="default-paragraph">Loading requests...</p>
      </section>
    </main>

    <section id="newsletter" class="section-p1 section-m1">
      <div class="newstext">
        <!-- change later, look at planning sheet -->
        <h4>Sign Up for Newsletter</h4>
        <!-- change later, look at planning sheet -->
        <p>
          Get E-mail updates about latest shop and <span>special offers</span>
        </p>
      </div>
      <div id="newsletter-form" class="form">
        <input id="newsletter-email" type="email" placeholder="Your email address" />
        <button type="submit" id="newsletter-submit" class="normal">Sign Up</button>
      </div>
    </section>

    <footer></footer>
    <div class="cart-drawer" id="cartDrawer" aria-modal="true" role="dialog" aria-label="Cart">
    </div>

    <script src="../js/components/footer.js"></script>
    <script type="module" src="../js/pages/admin/authentication-review.js"></script>
    <script type="module" src="../js/components/newsletter.js"></script>
    <script type="module" src="../js/components/nav.js"></script>
    <script type="module" src="../js/components/cartDrawer.js"></script>
  </body>
</html>
