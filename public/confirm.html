<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <link rel="stylesheet" href="./css/confirm.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components/skeleton.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/854f8a6196.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="header"></section>

    <div class="confirmation-wrapper">
        <div class="confirm-header">
            <h1>Thank you!</h1>
        </div>
        <div class="details-grid">
            <div class="confirm-left-content">
                <div class="order-details">
                    <h2 class="detail-header"><span class="skeleton skeleton-line medium"></span></h2>
                    <div class="details">
                        <span class="skeleton skeleton-line long"></span>
                        <span class="skeleton skeleton-line long"></span>
                        <span class="skeleton skeleton-line short"></span>
                    </div>
                </div>
            <div class="payment-details">
                <div class="order-details">
                    <h2 class="detail-header"><span class="skeleton skeleton-line medium"></span></h2>
                    <div class="details">
                        <span class="skeleton skeleton-line short"></span>
                    </div>
                </div>
            </div>
            </div>
            <div class="confirm-right-content">
                <div class="order-details">
                    <div class="order-summary">
                        <div class="order-item">
                            <div class="product-info-wrapper">
                                <span class="skeleton skeleton-img"></span>
                                <div class="cart-product-info">
                                    <span class="skeleton skeleton-line medium"></span>
                                    <span class="skeleton skeleton-line long"></span>
                                    <span class="skeleton skeleton-line short"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="order-details">
                    <div class="order-total">
                        <span class="skeleton skeleton-line long"></span>
                        <span class="skeleton skeleton-line long"></span>
                        <span class="skeleton skeleton-line long"></span>
                    </div>
                </div>
            </div>
        </div>
       
    </div>
<script type="module" src="./js/commerce/confirm.js"></script>
</body>
</html>
