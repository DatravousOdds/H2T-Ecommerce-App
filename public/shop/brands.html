<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style2.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/utilities/utility.css" />
    <link rel="stylesheet" href="../css/components/product-card.css">
    <link rel="stylesheet" href="../css/components/newsletter.css" />
    <link rel="stylesheet" href="../css/components/cartDrawer.css" />

    <link rel="icon" type="image/png" href="../images/H2T LogoB Small.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/854f8a6196.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
    <title>Head-To-Toes : Brands</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Header section -->
    <section id="header">
      <nav class="navbar"></nav>
    </section>

    <section id="page-header" class="men-header">
      <h2>Shop By Brand</h2>
      <p>
        Browse every brand we carry. Featured brands are always shown; the
        rest grow as sellers list more items under them.
      </p>
    </section>

    <!-- Breadcrumbs -->
    <div class="breadcrumbs">
      <ol class="breadcrumbs-routes">
        <li><a href="/">Home</a></li>
        <li><span>></span></li>
        <li id="curr-page" class="curr-pg">Brands</li>
      </ol>
    </div>

    <!-- Featured brands: always shown, curated banners -->
    <section id="brands" class="section-p1">
      <div class="section-header">
        <h2>Featured Brands</h2>
      </div>
      <div class="banner-grid" id="featuredBrandGrid"></div>
    </section>

    <!-- Every other brand a seller has listed under, text-only tiles -->
    <section id="all-brands" class="section-p1 u-mg-t-md">
      <div class="section-header">
        <h2>All Brands</h2>
      </div>
      <div class="brand-tile-grid" id="allBrandsGrid"></div>
    </section>

    <!-- newsletter -->
    <section id="newsletter" class="section-p1 section-m1">
      <div class="newstext">
        <h4>Sign Up for Newsletter</h4>
        <p>
          Get E-mail updates about latest shop and <span>special offers</span>
        </p>
      </div>
      <div class="form">
        <input type="text" placeholder="  Your email address" />
        <button class="normal">Sign Up</button>
      </div>
    </section>

    <footer class="section-p1"></footer>

    <div class="cart-drawer" id="cartDrawer" aria-modal="true" role="dialog" aria-label="Cart">
    </div>
    <div class="cart-drawer-backdrop" id="cartBackdrop"></div>

    <script type="module" src="../js/pages/brands.js"></script>
    <script type="module" src="../js/components/newsletter.js"></script>
    <script type="module" src="../js/core/global.js"></script>
    <script src="../js/components/footer.js"></script>
    <script type="module" src="../js/components/nav.js"></script>
  </body>
</html>
