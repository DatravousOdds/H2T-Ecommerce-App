<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>

    <link rel="modulepreload" href="js/components/nav.js">
    <link rel="stylesheet" href="css/style2.css" />
    <link rel="stylesheet" href="css/components/newsletter.css" />
    <link rel="stylesheet" href="css/components/cartDrawer.css"/>
    <link rel="stylesheet" href="css/cart.css">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
    />

    <script
      src="https://kit.fontawesome.com/854f8a6196.js"
      crossorigin="anonymous"
    ></script>
    <link rel="icon" type="image/png" href="./images/Hexxo_Bg_Removed.png" />
    <title>Hexxo : Cart</title>
    <!-- Bootstrap CSS + JS pinned to the same version (5.3.8) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
  </head>

  <body>
    <!-- Navbar -->
    <section id="header">
      <nav></nav>
    </section>
    <!-- End of Navbar-->
    <main>
      <div class="content-wrapper">
        <header>
          <h1>Bag</h1>
          <p class="bag-note">Taxes and fees are calculated at checkout</p>
        </header>

        <section id="cart" class="cart">
          <div class="bag-item-grid" id="bagItemGrid">
            <!-- Static placeholder item for layout/CSS work. cart.js replaces
                 the contents of #bagItemGrid with real cart data at runtime,
                 so this markup is the template to mirror, not leftover test data. -->
            <div class="item-container">
              <div class="item-wrapper">
                <div class="item-info">
                  <div class="seller-info">
                    <img src="./images/pexels-erik-mclean-9367504%202.jpg" alt="Seller profile photo">
                    <div class="seller-at">
                      <p>Gio</p>
                      <p>@gioseller</p>
                    </div>
                  </div>
                  <img src="./images/accessories_1.jpeg" class="product-img" alt="Nike Air Jordan 1 sneaker">
                </div>
                <div class="item-description">
                  <p>Nike Jordan 1</p>
                  <div class="item-price">
                    <p class="retail-price">$200</p>
                    <p class="listing-price">$150</p>
                  </div>
                  <p>Size M</p>
                  <p>Brand New</p>
                  <div class="button-container">
                    <button class="delete-product" id="deleteProduct">
                      <i class="fa-regular fa-trash-can"></i>
                    </button>
                  </div>
                </div>
              </div>

              <div class="item-cost">
                <div class="cost-row">
                  <p class="item-cost-label">Subtotal:</p>
                  <p class="item-cost">$150.00</p>
                </div>

                <button type="button" class="checkout-btn" id="checkoutBtn">Checkout</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- newsletter -->
    <section id="newsletter" class="section-p1 section-m1">
      <div class="newstext">
        <!-- change later, look at planning sheet -->
        <h4>Sign Up for Newsletter</h4>
        <!-- change later, look at planning sheet -->
        <p>
          Get E-mail updates about latest shop and <span>special offers</span>
        </p>
      </div>
      <form id="newsletter-form" class="form">
        <label for="newsletter-email" class="visually-hidden">Email address</label>
        <input id="newsletter-email" name="email" type="email" placeholder="Your email address" required />
        <button type="submit" id="newsletter-submit" class="normal">Sign Up</button>
      </form>
    </section>

    <!-- footer -->
    <footer></footer>

    <div class="cart-drawer" id="cartDrawer" aria-modal="true" role="dialog" aria-label="Cart">
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/commerce/cart.js"></script>
    <script type="module" src="js/components/cartDrawer.js"></script>
    <script type="module" src="js/components/nav.js"></script>
    <script src="js/components/footer.js"></script>
    <!-- <script type="module" src="js/pages/home.js"></script> -->
    <script>
      // sidebar
      $(function () {
        $(".nav-btn-dd").click(function () {
          $("#menu").addClass("active");
        });
        $(".close-btn").click(function () {
          $("#menu").removeClass("active");
        });
      });
    </script>
  </body>
</html>
