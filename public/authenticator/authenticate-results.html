<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://code.jquery.com/jquery-3.1.1.js"></script>
    <link rel="stylesheet" href="/css/style2.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/pages/authResults.css" />
    <link rel="stylesheet" href="/css/components/pageLoader.css">
    <link rel="stylesheet" href="/css/components/skeleton.css" />
    <link rel="stylesheet" href="/css/components/newsletter.css" />
    <link rel="stylesheet" href="/css/components/cartDrawer.css"/>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
    />
   
    <script
      src="https://kit.fontawesome.com/854f8a6196.js"
      crossorigin="anonymous"
    ></script>
    <link rel="icon" type="image/png" href="/images/Hexxo_Bg_Removed.png" />
    <title>Hexxo : Authentication Results</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </head>

  <body>

    <!-- Navbar -->
    <section id="header">
      <nav></nav>
    </section>
    <!-- End of Navbar-->

    <main class="results-wrapper is-loading">
        <!-- Skeleton state: shown only while authenticationResults.js fetches the
             request, then swapped out for the real content below. -->
        <div class="content-header skeleton-item" aria-hidden="true">
            <div class="content-title">
                <span class="skeleton skeleton-line" style="width: 260px; height: 1.75rem;"></span>
                <span class="skeleton skeleton-line short" style="margin-top: 0.5rem;"></span>
            </div>
            <span class="skeleton" style="width: 160px; height: 2.5rem; border-radius: 8px;"></span>
        </div>
        <div class="flex-wrapper skeleton-item" aria-hidden="true">
            <section class="details">
                <span class="skeleton skeleton-image" style="height: 500px; margin-bottom: 1rem;"></span>
                <span class="skeleton" style="display: block; width: 100%; height: 140px; border-radius: 8px; margin-bottom: 2rem;"></span>
                <div style="display: flex; gap: 1rem;">
                    <span class="skeleton" style="flex: 1; height: 3rem; border-radius: 4px;"></span>
                    <span class="skeleton" style="flex: 1; height: 3rem; border-radius: 4px;"></span>
                </div>
            </section>
            <section>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line medium" style="margin-bottom: 2rem;"></span>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line medium"></span>
            </section>
        </div>

        <!-- Real content: populated entirely by authenticationResults.js's
             renderAuthResults(), so nothing static belongs here. -->
        <div class="content-header" id="contentHeader"></div>
        <div class="flex-wrapper">
            <section id="details" class="details"></section>
            <section id="productRemarks"></section>
        </div>
    </main>

    <!-- Certificate of Authenticity: rendered off-screen (not display:none, so
         html2canvas can still lay it out) and only populated/used when the
         request is approved. downloadCertBtn snapshots this node to a PNG. -->
    <div class="certificate" id="certificate" aria-hidden="true">
        <div class="certificate-watermark"></div>
        <div class="certificate-inner">
            <img src="/images/Hexxo_Bg_Removed.png" class="certificate-logo" alt="">
            <h2 class="certificate-title">Certificate of Authenticity</h2>
            <p class="certificate-subtitle">Provided by Hexxo</p>
            <hr class="certificate-divider">
            <div class="certificate-row">
                <div>
                    <p class="certificate-label">Brand</p>
                    <p class="certificate-value" id="certBrand"></p>
                </div>
                <div>
                    <p class="certificate-label">Authenticate Type</p>
                    <p class="certificate-value" id="certTier"></p>
                </div>
            </div>
            <div class="certificate-row">
                <div>
                    <p class="certificate-label">Submission Date</p>
                    <p class="certificate-value" id="certDate"></p>
                </div>
                <div>
                    <p class="certificate-label">Certificate Owner</p>
                    <p class="certificate-value" id="certOwner"></p>
                </div>
            </div>
            <div class="certificate-passed">
                <img src="/images/hexxo_auth_badge.png" alt="">
                <span>Passed Authentication</span>
            </div>
            <div class="certificate-qr">
                <i class="bi bi-qr-code"></i>
            </div>
            <div class="certificate-photos" id="certPhotos"></div>
        </div>
    </div>

    <!-- newsletter -->
    <section id="newsletter" class="section-p1 section-m1">
      <div class="newstext">
        <!-- change later, look at planning sheet -->
        <h4>Sign Up for Newsletter</h4>
        <!-- change later, look at planning sheet -->
        <p>
          Get E-mail updates about latest shop and <span>special offers</span>
        </p>
      </div>
      <div id="newsletter-form" class="form">
        <input id="newsletter-email" type="email" placeholder="Your email address" />
        <button type="submit" id="newsletter-submit" class="normal">Sign Up</button>
      </div>
    </section>

    <!-- footer -->
    <footer></footer >
    <div class="cart-drawer" id="cartDrawer" aria-modal="true" role="dialog" aria-label="Cart">
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"
      integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/components/cartDrawer.js"></script>
    <script type="module" src="/js/components/nav.js"></script>
    <script type="module" src="/js/components/newsletter.js"></script>
    <script src="/js/components/footer.js"></script>
    <script type="module" src="/js/pages/search.js"></script>
    <script type="module" src="/js/services/authenticationResults.js"></script>
    
  </body>
</html>
