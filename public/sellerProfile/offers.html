<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offers - Head-To-Toes</title>
    <script
      src="https://kit.fontawesome.com/854f8a6196.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/style2.css" />
    <link rel="stylesheet" href="../css/components/pageLoader.css" />
    <link rel="stylesheet" href="../css/components/skeleton.css" />
    <link rel="stylesheet" href="../css/components/newsletter.css" />
    <link rel="stylesheet" href="../css/components/cartDrawer.css" />
    <link rel="stylesheet" href="../css/pages/sellerProfile.css" />
    <link rel="stylesheet" href="../css/pages/sellerProfileOffers.css" />
  </head>

  <body>
    <!-- Navbar -->
    <section id="header">
      <nav></nav>
    </section>
    <!-- End of Navbar -->

    <section class="offers-conversation-header section-p1">
      <img src="" alt="" class="seller-avatar" id="seller-picture" />
      <div class="seller-header-info">
        <p class="offers-conversation-label">Offers with</p>
        <h1 class="seller-username" id="seller-username"></h1>
      </div>
    </section>

    <section class="offers-conversation-section section-p1">
      <div class="offers-conversation-list" id="offersConversationList"></div>
    </section>

    <!-- Newsletter -->
    <section id="newsletter" class="section-p1 section-m1"></section>

    <footer class="section-p1"></footer>

    <div class="cart-drawer" id="cartDrawer" aria-modal="true" role="dialog" aria-label="Cart">
    </div>
    <div class="cart-drawer-backdrop" id="cartBackdrop"></div>

    <script type="module" src="../js/pages/sellerProfileOffers.js"></script>
    <script type="module" src="../js/components/newsletter.js"></script>
    <script type="module" src="../js/components/nav.js"></script>
    <script src="../js/components/footer.js"></script>
  </body>
</html>
